<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Math Quest 7B</title>
<style>
:root{--b:#07111f;--p:#112b47;--p2:#183f66;--t:#eef7ff;--m:#aac1d8;--g:#ffd34d;--ok:#34d17f;--no:#ff6f79}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial;background:radial-gradient(circle at top,#1c507e,#07111f 48%);color:var(--t);min-height:100vh}
.wrap{max-width:1120px;margin:auto;padding:18px}header{display:flex;justify-content:space-between;gap:16px;align-items:center;background:linear-gradient(135deg,#183957,#0b1c30);border:1px solid #2c5d88;border-radius:20px;padding:20px}
h1{margin:0;font-size:clamp(31px,5vw,56px)}header p,.muted{color:var(--m)}.profile{min-width:250px;background:#091827;padding:13px;border-radius:14px}.row{display:flex;justify-content:space-between;margin:6px 0}
.bar{height:11px;background:#263a4e;border-radius:20px;overflow:hidden}.bar div{height:100%;background:linear-gradient(90deg,#56bfff,var(--g));width:0}
nav{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.btn{border:0;border-radius:10px;padding:10px 14px;background:#24517d;color:#fff;font-weight:700;cursor:pointer}.gold{background:linear-gradient(135deg,#ffd54c,#f3a21f);color:#241900}
.screen{display:none}.active{display:block}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:14px}.card,.box{background:linear-gradient(160deg,#173653,#0c1d30);border:1px solid #2b577f;border-radius:17px;padding:18px;box-shadow:0 12px 30px #0006}
.world{position:relative}.locked{opacity:.42}.icon{font-size:48px}.pill{position:absolute;right:12px;top:12px;background:#081725;padding:5px 8px;border-radius:20px;font-size:12px}
.modegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.box{max-width:820px;margin:auto}.q{font-size:clamp(23px,3.3vw,36px);margin:22px 0}.opts{display:grid;gap:10px}.opt{padding:14px;text-align:left;border-radius:12px;background:#183f66;color:#fff;border:2px solid transparent;font-weight:650;cursor:pointer}.opt.correct{background:#17633f;border-color:#55efa2}.opt.wrong{background:#702b35;border-color:#ff949b}
.feedback{display:none;margin-top:15px;padding:14px;border-radius:12px}.feedback.good{display:block;background:#143c2b;border:1px solid var(--ok)}.feedback.bad{display:block;background:#4b2027;border:1px solid var(--no)}
.step{background:#0c2136;border-left:5px solid #58bfff;padding:14px;margin:12px 0;border-radius:0 12px 12px 0}.battle{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}.fighter{text-align:center;background:#091827;padding:13px;border-radius:14px}.avatar{font-size:58px}
table{width:100%;border-collapse:collapse}th,td{padding:11px;border-bottom:1px solid #284762;text-align:left}.hidden{display:none!important}.next{display:flex;justify-content:space-between;margin-top:13px}
@media(max-width:650px){header{flex-direction:column;align-items:stretch}.profile{min-width:0}.battle{grid-template-columns:1fr}}
</style></head><body><div class="wrap">
<header><div><h1>🎮 Math Quest 7B</h1><p>III Partial · Santiago Edition</p></div><div class="profile"><div class="row"><b>👤 Santiago</b><span id="lvl">Nivel 1</span></div><div class="row"><span>XP</span><span id="xpTxt">0 / 500</span></div><div class="bar"><div id="xpBar"></div></div><div class="row"><span>🪙 Monedas</span><b id="coins">0</b></div><div class="row"><span>🔥 Mejor racha</span><b id="best">0</b></div></div></header>
<nav><button class="btn gold" onclick="show('map')">🗺️ Mapa</button><button class="btn" onclick="show('journal')">📖 Diario</button><button class="btn" onclick="show('parent')">📊 Progreso</button></nav>

<section id="map" class="screen active"><h2>Mapa del III parcial</h2><div id="worlds" class="grid"></div></section>
<section id="world" class="screen"><button class="btn" onclick="show('map')">← Mapa</button><h2 id="wtitle"></h2><p id="wsub" class="muted"></p><div id="modes" class="modegrid"></div></section>
<section id="academy" class="screen"><div class="box"><button class="btn" onclick="show('world')">← Volver</button><h2 id="atitle"></h2><div id="acontent"></div><button class="btn gold" onclick="start('practice',10)">Practicar</button></div></section>
<section id="quiz" class="screen"><div class="box"><div id="battle" class="battle hidden"><div class="fighter"><div class="avatar">🏎️</div><b>Santiago</b><div class="bar"><div id="php"></div></div></div><div class="fighter"><div class="avatar" id="eavatar">🛡️</div><b id="ename">Rival</b><div class="bar"><div id="ehp"></div></div></div></div><div class="row"><span id="qmode"></span><span id="count"></span><span>🔥 <b id="streak">0</b></span></div><div class="bar"><div id="qbar"></div></div><div class="q" id="qtext"></div><div id="opts" class="opts"></div><div id="fb" class="feedback"></div><div class="next"><button class="btn" onclick="show('world')">Salir</button><button id="nextBtn" class="btn gold hidden" onclick="nextQ()">Siguiente ➜</button></div></div></section>
<section id="journal" class="screen"><div class="box"><h2>📖 Diario</h2><div id="journalData"></div></div></section>
<section id="parent" class="screen"><div class="box"><h2>📊 Modo mamá/papá</h2><table><thead><tr><th>Mundo</th><th>Correctas</th><th>Intentos</th><th>Dominio</th><th>Estado</th></tr></thead><tbody id="ptable"></tbody></table><h3>Recomendación</h3><p id="rec"></p></div></section>
<section id="result" class="screen"><div class="box" style="text-align:center"><div id="ricon" style="font-size:72px">🏆</div><h2 id="rtitle"></h2><p id="rtext"></p><button class="btn gold" onclick="show('world')">Volver</button></div></section>
</div><script>
const KEY="mq7b_v01",W=[["🏰","Fortaleza de los Exponentes","Lesson 5.9","Powers of Products and Quotients"],["🏎️","Speed Raceway","Lesson 6.1","Ratios and Unit Rates"],["🏛️","Temple of Proportions","Lesson 6.2","Proportions"],["🗺️","Scale City","Lesson 6.3","Similar Figures and Scale Drawings"],["🧪","Conversion Lab","Lesson 6.4","Fractions, Decimals, and Percents"],["👑","Kingdom of Percents","Lesson 6.5","Proportions and Percents"]];
let S=JSON.parse(localStorage.getItem(KEY)||"null")||{xp:0,coins:0,best:0,current:1,worlds:{1:{u:1,c:0,a:0,done:0},2:{u:0,c:0,a:0,done:0},3:{u:0,c:0,a:0,done:0},4:{u:0,c:0,a:0,done:0},5:{u:0,c:0,a:0,done:0},6:{u:0,c:0,a:0,done:0}}};let active=1,G={};
function save(){localStorage.setItem(KEY,JSON.stringify(S));render()}
function show(id){document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));document.getElementById(id).classList.add("active");if(id==="journal"||id==="parent")render()}
function M(id){let x=S.worlds[id];return x.a?Math.round(x.c/x.a*100):0}
function render(){let l=Math.floor(S.xp/500)+1,r=S.xp%500;lvl.textContent="Nivel "+l;xpTxt.textContent=r+" / 500";xpBar.style.width=r/5+"%";coins.textContent=S.coins;best.textContent=S.best;worlds.innerHTML="";W.forEach((w,i)=>{let id=i+1,s=S.worlds[id],d=document.createElement("div");d.className="card world "+(s.u?"":"locked");d.innerHTML=`<span class="pill">${s.done?"✅ Completado":s.u?"🔓 Disponible":"🔒 Bloqueado"}</span><div class="icon">${w[0]}</div><h3>${w[1]}</h3><p><b>${w[2]}</b><br>${w[3]}</p><div class="bar"><div style="width:${M(id)}%"></div></div><p class="muted">Dominio: ${M(id)}%</p><button class="btn gold" ${s.u?"":"disabled"}>Entrar</button>`;d.querySelector("button").onclick=()=>openWorld(id);worlds.appendChild(d)});journalData.innerHTML=W.slice(0,2).map((w,i)=>`<div class="step"><b>${w[0]} ${w[2]} · ${w[1]}</b><p>Dominio: ${M(i+1)}% · ${S.worlds[i+1].done?"Completado":"En progreso"}</p></div>`).join("");ptable.innerHTML=W.map((w,i)=>{let s=S.worlds[i+1];return `<tr><td>${w[0]} ${w[2]}</td><td>${s.c}</td><td>${s.a}</td><td>${M(i+1)}%</td><td>${s.done?"Completado":s.u?"En progreso":"Bloqueado"}</td></tr>`}).join("");let weak=[1,2].filter(i=>S.worlds[i].a).sort((a,b)=>M(a)-M(b))[0];rec.textContent=weak?`Conviene reforzar ${W[weak-1][2]}: ${W[weak-1][1]}.`:"Comienza por la Academia de Lesson 5.9."}
function openWorld(id){if(!S.worlds[id].u)return;active=id;S.current=id;save();wtitle.textContent=W[id-1][0]+" "+W[id-1][1];wsub.textContent=W[id-1][2]+" · "+W[id-1][3];let enabled=id<=2;modes.innerHTML="";[["📚","Academia","Aprende las reglas","academy"],["🎯","Práctica","10 retos con explicación","practice"],[id===2?"🏁":"⚔️",id===2?"Carrera":"Batalla","Compite respondiendo","battle"],["👾","Jefe final","Se desbloquea con 70%","boss"],["📝","Examen","15 preguntas mixtas","exam"]].forEach(x=>{let c=document.createElement("div");c.className="card";c.innerHTML=`<div class="icon">${x[0]}</div><h3>${x[1]}</h3><p class="muted">${x[2]}</p><button class="btn gold" ${enabled?"":"disabled"}>${enabled?"Entrar":"Próximamente"}</button>`;if(enabled)c.querySelector("button").onclick=()=>launch(x[3]);modes.appendChild(c)});show("world")}
function launch(a){if(a==="academy")academy();else if(a==="practice")start("practice",10);else if(a==="battle")start("battle",8);else if(a==="exam")start("exam",15);else{if(M(active)<70){alert("Se desbloquea con 70% de dominio.");return}start("boss",10)}}
function academy(){atitle.textContent=W[active-1][0]+" Academia · "+W[active-1][2];acontent.innerHTML=active===1?`<div class="step"><b>Potencia de un producto</b><p>(ab)ⁿ=aⁿbⁿ. Ejemplo: (3x²)²=9x⁴.</p></div><div class="step"><b>Potencia de un cociente</b><p>(a/b)ⁿ=aⁿ/bⁿ. Ejemplo: (2x/3)³=8x³/27.</p></div><div class="step"><b>Potencia de una potencia</b><p>(xᵐ)ⁿ=xᵐⁿ. Multiplica exponentes.</p></div><div class="step"><b>Signos</b><p>(−2x)⁴=16x⁴, pero −(2x)⁴=−16x⁴.</p></div>`:`<div class="step"><b>Razón</b><p>Compara dos cantidades: 8:4=2:1.</p></div><div class="step"><b>Tasa</b><p>Compara cantidades con unidades diferentes.</p></div><div class="step"><b>Tasa unitaria</b><p>El segundo término es 1. 180 km en 3 h = 60 km/h.</p></div><div class="step"><b>Mejor compra</b><p>Calcula el precio por unidad; el menor costo unitario gana.</p></div>`;show("academy")}
function R(a,b){return Math.floor(Math.random()*(b-a+1))+a}function sup(n){return String(n).replace(/2/g,"²").replace(/3/g,"³").replace(/4/g,"⁴").replace(/5/g,"⁵").replace(/6/g,"⁶").replace(/7/g,"⁷").replace(/8/g,"⁸").replace(/9/g,"⁹")}
function makeQ(){if(active===1){let v=["x","y","a","m"][R(0,3)],c=R(2,5),e=R(1,3),n=R(2,3),t=R(1,3);if(t===1){let A=c**n,E=e*n;return{q:`Simplifica: (${c}${v}${sup(e)})${sup(n)}`,a:`${A}${v}${sup(E)}`,why:`Eleva ${c}: ${A}. Multiplica exponentes: ${e}×${n}=${E}.`}}if(t===2){let d=R(2,5),A=c**n,D=d**n,E=e*n;return{q:`Simplifica: (${c}${v}${sup(e)}/${d})${sup(n)}`,a:`${A}${v}${sup(E)}/${D}`,why:`Eleva numerador y denominador.`}}let E=e*n;return{q:`Simplifica: (${v}${sup(e)})${sup(n)}`,a:`${v}${sup(E)}`,why:`Multiplica exponentes: ${e}×${n}=${E}.`}}let t=R(1,3);if(t===1){let q=R(3,12),r=R(4,25),tot=q*r;return{q:`${q} cuadernos cuestan L ${tot}. ¿Costo por cuaderno?`,a:`L ${r}`,why:`${tot}÷${q}=${r}.`}}if(t===2){let h=R(2,6),r=R(30,90),km=h*r;return{q:`Se recorren ${km} km en ${h} horas. ¿Km/h?`,a:`${r} km/h`,why:`${km}÷${h}=${r} km/h.`}}let a=R(2,10),k=R(2,5),b=a*k;return{q:`Simplifica la razón ${b}:${a}.`,a:`${k}:1`,why:`Divide ambos términos entre ${a}.`}}
function choices(q){let s=new Set([q.a]);while(s.size<4){let f=q.a;if(/\d/.test(f))f=f.replace(/\d+/,m=>String(Math.max(1,Number(m)+R(-4,5))));else f=["2:1","3:1","Opción A","Opción B"][R(0,3)];s.add(f)}return[...s].sort(()=>Math.random()-.5)}
function start(mode,n){G={mode,qs:Array.from({length:n},makeQ),i:0,score:0,streak:0,p:100,e:100};battle.classList.toggle("hidden",!["battle","boss"].includes(mode));eavatar.textContent=mode==="boss"?"👾":active===2?"🏁":"🛡️";ename.textContent=mode==="boss"?"Jefe final":active===2?"Corredor rival":"Centinela";show("quiz");load()}
function load(){let q=G.qs[G.i],ch=choices(q);G.q=q;G.right=ch.indexOf(q.a);G.answered=0;qmode.textContent=G.mode==="exam"?"📝 Examen":G.mode==="boss"?"👾 Jefe final":G.mode==="battle"?(active===2?"🏁 Carrera":"⚔️ Batalla"):"🎯 Práctica";count.textContent=`Pregunta ${G.i+1} de ${G.qs.length}`;streak.textContent=G.streak;qbar.style.width=G.i/G.qs.length*100+"%";qtext.textContent=q.q;opts.innerHTML="";fb.className="feedback";nextBtn.classList.add("hidden");ch.forEach((x,i)=>{let b=document.createElement("button");b.className="opt";b.textContent=String.fromCharCode(65+i)+". "+x;b.onclick=()=>answer(i,b);opts.appendChild(b)});hp()}
function answer(i,b){if(G.answered)return;G.answered=1;let ok=i===G.right,s=S.worlds[active];s.a++;[...opts.children].forEach((x,j)=>{x.disabled=1;if(j===G.right)x.classList.add("correct")});if(ok){s.c++;G.score++;G.streak++;S.best=Math.max(S.best,G.streak);S.xp+=25;S.coins+=10;if(["battle","boss"].includes(G.mode))G.e=Math.max(0,G.e-(G.mode==="boss"?10:14));fb.className="feedback good";fb.innerHTML="<b>✅ Correcto</b><br>"+G.q.why}else{G.streak=0;b.classList.add("wrong");if(["battle","boss"].includes(G.mode))G.p=Math.max(0,G.p-(G.mode==="boss"?14:18));fb.className="feedback bad";fb.innerHTML="<b>❌ Respuesta: "+G.q.a+"</b><br>"+G.q.why}save();hp();nextBtn.classList.remove("hidden")}
function hp(){php.style.width=G.p+"%";ehp.style.width=G.e+"%"}
function nextQ(){if(["battle","boss"].includes(G.mode)&&(G.p<=0||G.e<=0))return finish();G.i++;if(G.i>=G.qs.length)finish();else load()}
function finish(){let p=Math.round(G.score/G.qs.length*100),s=S.worlds[active];if(G.mode==="boss"&&p>=80){s.done=1;if(S.worlds[active+1])S.worlds[active+1].u=1}save();ricon.textContent=p>=80?"🏆":p>=60?"⭐":"💪";rtitle.textContent=p>=80?"¡Misión superada!":p>=60?"Buen avance":"Otra ronda ayudará";rtext.textContent=`Resultado: ${G.score} de ${G.qs.length} (${p}%).`;show("result")}
render();
</script></body></html>
